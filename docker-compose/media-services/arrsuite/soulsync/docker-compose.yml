services:
  soulsync:
    image: boulderbadgedad/soulsync:latest
    container_name: soulsync-webui
    env_file:
      - ../.env
    environment:
      - PUID=${MUSIC_PUID}
      - PGID=${MUSIC_PGID}
      - UMASK=022
      - PYTHONPATH=/app
      - SOULSYNC_CONFIG_PATH=/opt/soulsync/config
      - TZ=America/New_York
      - SOULSYNC_SPOTIFY_CALLBACK_PORT=8888
      - SOULSYNC_TIDAL_CALLBACK_PORT=8889
    ports:
      - "8008:8008"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - /opt/docker/soulsync/config:/app/config
      - /opt/docker/soulsync/logs:/app/logs
      - /mnt/data/music_downloads:/app/downloads
      - /mnt/data/music_staging:/app/Staging
      - /mnt/data/music:/music:rw
      - /opt/docker/soulsync/music-videos:/app/MusicVideos
      - /opt/docker/soulsync/scripts:/app/scripts
      - soulsync_database:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  soulsync_database:
    driver: local

networks:
  default:
    name: soulsync-network
