services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data:/prometheus
    networks:
      - monitoring
    ports:
      - "9090:9090"

volumes:
  prometheus_data:

networks:
  monitoring:
    driver: bridge
