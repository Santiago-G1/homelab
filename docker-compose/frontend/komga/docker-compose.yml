services:
  komga:
    image: gotson/komga:latest
    container_name: komga
    env_file:
      - ../.env
    environment:
      - PUID=${GLOBAL_PUID}
      - PGID=${GLOBAL_PGID}
      - TZ=Etc/UTC
    volumes:
      - /opt/komga/data:/config
      - /mnt/data/comics:/data
    ports:
      - 25600:25600
    restart: unless-stopped
