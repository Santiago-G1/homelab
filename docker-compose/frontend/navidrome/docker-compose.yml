services:
  navidrome:
    image: lscr.io/linuxserver/navidrome:latest
    container_name: navidrome
    env_file:
      - ../.env
    environment:
      - PUID=${NAVIDROME_PUID}
      - PGID=${NAVIDROME_PGID}
      - TZ=Etc/UTC
    volumes:
      - /opt/navidrome/data:/config
      - /mnt/data/music:/data
    ports:
      - 4533:4533
    restart: unless-stopped
