sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    env_file:
      - ../.env
    environment:
      - PUID=${GLOBAL_PUID}
      - PGID=${GLOBAL_PGID}
      - TZ=Etc/UTC
    volumes:
      - /opt/sonarr/config:/config
      - /mnt/data:/data
    ports:
      - 8989:8989
    restart: unless-stopped
